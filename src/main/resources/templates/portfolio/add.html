<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add Portfolio Item')}"></head>
<body class="app-body section-portfolio">
<div class="app-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="page">
        <div class="page-header">
            <div>
                <h1>Add To Portfolio</h1>
                <p class="subtle">Each owned copy is stored as a separate record.</p>
            </div>
        </div>
        <section class="card">
            <form th:action="@{/portfolio/items}" th:object="${ownedItemForm}" method="post" class="form-grid">
                <p th:if="${#fields.hasGlobalErrors()}" class="error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">Error</p>
                <label>
                    Card
                    <select th:field="*{cardId}" required>
                        <option value="">Select a card</option>
                        <option th:each="card : ${cardOptions}" th:value="${card.id}"
                                th:text="${card.displayLabel}">Card</option>
                    </select>
                </label>
                <label>
                    Owned Variant
                    <select th:field="*{variant}">
                        <option value="">Use card default</option>
                        <option th:each="variant : ${variants}" th:value="${variant}" th:text="${variant.label}">Standard</option>
                    </select>
                </label>
                <label>
                    Condition
                    <select th:field="*{condition}">
                        <option th:each="condition : ${conditions}" th:value="${condition}" th:text="${condition.label}">Near Mint</option>
                    </select>
                </label>
                <label>
                    Purchase Price (SGD)
                    <input th:field="*{purchasePriceSgd}" type="number" min="0" step="0.01" required>
                </label>
                <label>
                    Purchase Date
                    <input th:field="*{purchaseDate}" type="date" required>
                </label>
                <label>
                    Graded Status
                    <select th:field="*{gradedStatus}">
                        <option th:each="status : ${gradedStatuses}" th:value="${status}" th:text="${status.label}">Ungraded</option>
                    </select>
                </label>
                <label>
                    PSA Grade
                    <input th:field="*{psaGrade}" type="number" min="1" max="10">
                </label>
                <label>
                    PSA Certification Number
                    <input th:field="*{psaCertificationNumber}">
                </label>
                <label>
                    Notes
                    <textarea th:field="*{notes}" rows="3"></textarea>
                </label>
                <div class="actions">
                    <button class="primary" type="submit">Add Holding</button>
                    <a class="button" th:href="@{/catalog/search}">Search Official Catalogue</a>
                    <a class="button" th:href="@{/cards/new}">Create Custom Card</a>
                    <a class="button" th:href="@{/portfolio/add-sealed}">Add Sealed Product</a>
                </div>
            </form>
        </section>
        <section class="card">
            <table class="table">
                <thead>
                <tr>
                    <th>Card</th>
                    <th>Set</th>
                    <th>Available Variants</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${cardOptions.isEmpty()}">
                    <td colspan="4" class="subtle">No cards available.</td>
                </tr>
                <tr th:each="card : ${cardOptions}">
                    <td class="catalog-card-cell">
                        <div class="card-cell-content">
                            <img class="card-detail-thumb" th:if="${card.imageLargeUrl != null}" th:src="${card.imageLargeUrl}" th:alt="${card.name}">
                            <img class="card-thumb" th:if="${card.imageLargeUrl == null and card.imageSmallUrl != null}" th:src="${card.imageSmallUrl}" th:alt="${card.name}">
                            <span class="image-placeholder" th:if="${card.imageLargeUrl == null and card.imageSmallUrl == null}">Image not available</span>
                            <span th:text="|${card.name} #${card.cardNumber}|">Card</span>
                        </div>
                    </td>
                    <td th:text="${card.setName}">Set</td>
                    <td th:text="${card.availableVariantLabels}">Standard</td>
                    <td>
                        <span class="badge"
                              th:classappend="${card.verificationStatus.name() == 'VERIFIED'} ? ' positive-badge' : ' muted-badge'"
                              th:text="${card.verificationStatus.label}">Verified</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
