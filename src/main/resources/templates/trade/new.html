<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create Trade')}"></head>
<body class="app-body section-trades">
<div class="app-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="page">
        <div class="page-header">
            <div>
                <h1>Create Trade</h1>
                <p class="subtle">Start in analysis-only mode. Execution is a separate confirmation step.</p>
            </div>
            <a class="button" th:href="@{/trades}">Trade History</a>
        </div>

        <section class="card message-card" th:if="${errorMessage != null}">
            <p class="error" th:text="${errorMessage}">Error</p>
        </section>

        <section class="card">
            <form class="form-grid" th:action="@{/trades}" method="post" th:object="${tradeCreateForm}">
                <label>Trade name
                    <input type="text" th:field="*{name}" placeholder="Weekend card show trade">
                </label>
                <div class="filter-grid">
                    <label>Outgoing percentage
                        <input type="number" step="0.01" min="0.01" th:field="*{outgoingTradePercentage}">
                    </label>
                    <label>Incoming percentage
                        <input type="number" step="0.01" min="0.01" th:field="*{incomingTradePercentage}">
                    </label>
                </div>
                <label>Notes
                    <textarea rows="4" th:field="*{notes}" placeholder="Optional context"></textarea>
                </label>
                <div class="actions">
                    <button class="primary" type="submit">Create Draft</button>
                    <a class="button" th:href="@{/trades}">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
