<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create Custom Card')}"></head>
<body>
<div class="app-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="page">
        <div class="page-header">
            <div>
                <h1>Create Custom / Unverified Card</h1>
                <p class="subtle">Create an English card record when the official catalogue is unavailable.</p>
            </div>
        </div>
        <section class="card message-card">
            <p class="warning">Manual cards are unverified and may not have reliable pricing or analytics.</p>
        </section>
        <section class="card">
            <form th:action="@{/cards}" th:object="${cardForm}" method="post" class="form-grid">
                <input type="hidden" name="returnTradeId" th:value="${returnTradeId}" th:if="${returnTradeId != null}">
                <label>
                    Card Name
                    <input th:field="*{name}" required>
                </label>
                <label>
                    Set Name
                    <input th:field="*{setName}" required>
                </label>
                <label>
                    Card Number
                    <input th:field="*{cardNumber}" required>
                </label>
                <label>
                    Language / Market
                    <select th:field="*{languageMarket}">
                        <option th:each="market : ${markets}" th:value="${market}" th:text="${market}">ENGLISH</option>
                    </select>
                </label>
                <label>
                    Variant
                    <select th:field="*{variant}">
                        <option th:each="variant : ${variants}" th:value="${variant}" th:text="${variant.label}">Standard</option>
                    </select>
                </label>
                <div class="actions">
                    <button class="primary" type="submit">Save Unverified Card</button>
                    <a class="button" th:if="${returnTradeId == null}" th:href="@{/catalog/search}">Official Catalogue</a>
                    <a class="button" th:if="${returnTradeId != null}" th:href="@{/catalog/search(returnTradeId=${returnTradeId})}">Official Catalogue</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
