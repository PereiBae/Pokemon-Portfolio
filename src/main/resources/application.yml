spring:
  application:
    name: pokemon-portfolio
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/pokemon_portfolio}
    username: ${DATABASE_USERNAME:pokemon_portfolio}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  thymeleaf:
    cache: false

app:
  owner:
    username: ${APP_OWNER_USERNAME:owner@example.com}
    display-name: ${APP_OWNER_DISPLAY_NAME:Portfolio Owner}
    bootstrap-password: ${APP_OWNER_BOOTSTRAP_PASSWORD:}
  catalog:
    providers:
      pokemon-tcg-api:
        enabled: ${POKEMON_TCG_API_ENABLED:true}
        base-url: ${POKEMON_TCG_API_BASE_URL:https://api.pokemontcg.io/v2}
        api-key: ${POKEMON_TCG_API_KEY:}
  pricing:
    providers:
      mock-enabled: true
      manual-entry-enabled: true
      tcg-player-enabled: false
      ebay-enabled: false
      price-charting-enabled: false
      pokemon-api:
        enabled: ${POKEMON_API_PRICING_ENABLED:false}
        base-url: ${POKEMON_API_PRICING_BASE_URL:https://pokemon-tcg-api.p.rapidapi.com}
        rapid-api-key: ${POKEMON_API_RAPIDAPI_KEY:}
  jobs:
    price-refresh-cron: "0 0 2 * * *"
    portfolio-valuation-cron: "0 15 2 * * *"
