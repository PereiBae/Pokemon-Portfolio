spring:
  datasource:
    url: jdbc:h2:mem:pokemon_portfolio;MODE=PostgreSQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

app:
  owner:
    username: owner@example.com
    display-name: Test Owner
    bootstrap-password: 1997pwner
  catalog:
    providers:
      pokemon-tcg-api:
        enabled: false
        base-url: https://example.test/pokemontcg
        api-key:
  pricing:
    providers:
      mock-enabled: true
      manual-entry-enabled: true
      tcg-player-enabled: false
      ebay-enabled: false
      price-charting-enabled: false
      pokemon-api:
        enabled: false
        base-url: https://example.test/pokemon-api
        rapid-api-key:
  exchange-rates:
    providers:
      frankfurter:
        enabled: false
        base-url: https://example.test/frankfurter
  jobs:
    price-refresh-cron: "0 0 2 * * *"
    portfolio-valuation-cron: "0 15 2 * * *"
    exchange-rate-refresh-cron: "0 30 1 * * *"
